name: Test & Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  DEPLOY_PATH: /home/ubuntu/github-action-test
  FRONTEND_DEPLOY_PATH: /var/www/github-action-test
  # DB_NAME: bmidb
  # DB_USER: bmi_user
  NODE_VERSION: '22'

jobs:
  deploy:
    runs-on: ubuntu-latest
    ##runs-on: [self-hosted, Linux, X64]
    # runs-on: self-hosted
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup SSH
      uses: webfactory/ssh-agent@v0.9.0
      with:
        ssh-private-key: ${{ secrets.EC2_KEY }}
        log-public-key: true

    - name: Configure SSH to skip host key checking
      run: |
        mkdir -p ~/.ssh
        cat >> ~/.ssh/config <<EOF
        Host ${{ secrets.EC2_HOST }}
          StrictHostKeyChecking no
          UserKnownHostsFile /dev/null
        EOF
        chmod 600 ~/.ssh/config

    - name: Test SSH Connection
      run: |
        ssh ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }} "echo 'SSH connection successful'"

    - name: Get Runner Public IP
      run: |
        echo "=========================================="
        echo "Runner Public IP Information"
        echo "=========================================="
        RUNNER_IP=$(curl -s http://api.ipify.org/?format=text)
        echo "Runner Public IP: $RUNNER_IP"
        echo "runner_ip=$RUNNER_IP" >> $GITHUB_OUTPUT        

    - name: Install Prerequisites (if needed)
      run: |
        ssh ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }} << "ENDSSH"
          set -e
          
          echo "=========================================="
          echo "Installing/Verifying Prerequisites"
          echo "=========================================="
          
          # Function to install NVM if not present
          install_nvm() {
            if [ ! -d "$HOME/.nvm" ]; then
              echo "Installing NVM..."
              curl -o- https://raw.githubusercontent.com/nvm-sh/nvm/v0.39.0/install.sh | bash
              export NVM_DIR="$HOME/.nvm"
              [ -s "$NVM_DIR/nvm.sh" ] && \. "$NVM_DIR/nvm.sh"
              echo "NVM installed"
            else
              echo "NVM already installed"
            fi
          }
          
          # Function to load NVM
          load_nvm() {
            export NVM_DIR="$HOME/.nvm"
            [ -s "$NVM_DIR/nvm.sh" ] && \. "$NVM_DIR/nvm.sh"
          }
          
          # Install NVM
          install_nvm
          
          # Load NVM
          load_nvm
          
          # Install Node.js if not present
          if ! command -v node &> /dev/null; then
            echo "Installing Node.js ${{ env.NODE_VERSION }}..."
            nvm install ${{ env.NODE_VERSION }}
            nvm use ${{ env.NODE_VERSION }}
            nvm alias default ${{ env.NODE_VERSION }}
            echo "Node.js $(node --version) installed"
          else
            echo "Node.js $(node --version) already installed"
            nvm install ${{ env.NODE_VERSION }}
            nvm use ${{ env.NODE_VERSION }}
          fi
          
          # Install PM2 if not present
          if ! command -v pm2 &> /dev/null; then
            echo "Installing PM2..."
            npm install -g pm2
            echo "PM2 installed"
          else
            echo "PM2 $(pm2 --version) already installed"
          fi
          
          # Install Nginx if not present
          if ! command -v nginx &> /dev/null; then
            echo "Installing Nginx..."
            sudo apt update
            sudo apt install -y nginx
            sudo systemctl enable nginx
            sudo systemctl start nginx
            echo "Nginx installed and started"
          else
            echo "Nginx already installed"
            sudo systemctl is-active nginx || sudo systemctl start nginx
          fi
          
          # Verify installations
          echo ""
          echo "Installed versions:"
          echo "  Node: $(node --version)"
          echo "  npm: $(npm --version)"
          echo "  PM2: $(pm2 --version)"
          echo "  Nginx: $(nginx -v 2>&1 | cut -d/ -f2)"
          echo ""
        ENDSSH

    - name: Deploy application
      run: |
        ssh ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }} << "ENDSSH"
          set -e
          
          # Load NVM
          export NVM_DIR="$HOME/.nvm"
          [ -s "$NVM_DIR/nvm.sh" ] && \. "$NVM_DIR/nvm.sh"
          
          # Use Node LTS
          nvm use ${{ env.NODE_VERSION }}
          
          echo "=========================================="
          echo "Deploying Application"
          echo "=========================================="
          echo "Node: $(node --version)"
          echo "npm: $(npm --version)"
          echo ""
          
          # Clone or pull repository
          if [ ! -d "${{ env.DEPLOY_PATH }}" ]; then
            echo "Fresh deployment - cloning repository..."
            git clone https://github.com/${{ github.repository }}.git ${{ env.DEPLOY_PATH }}
          else
            echo "Updating existing deployment..."
            cd ${{ env.DEPLOY_PATH }}
            git fetch origin
            git reset --hard origin/main
          fi
          
          cd ${{ env.DEPLOY_PATH }}

          # Install dependencies
            echo "Installing frontend dependencies..."
            npm install
            
            # Build frontend
            echo "Building frontend..."
            pm2 start npm --name "github-action-test" -- start
            pm2 save
            # Check if Nginx is installed
            if ! command -v nginx &> /dev/null; then
              echo "Warning: Nginx not found. Skipping frontend deployment."
              echo "Please install Nginx manually or re-run the prerequisite installation."
              cd ..
              exit 0
            fi
            
            # Deploy to Nginx
            echo "Deploying to Nginx..."
            sudo mkdir -p ${{ env.FRONTEND_DEPLOY_PATH }}
            sudo chown -R www-data:www-data ${{ env.FRONTEND_DEPLOY_PATH }}
            
            # Configure Nginx
            echo "Creating Nginx configuration..."
            printf '%s\n' \
              'server {' \
              '    listen 80;' \
              '    server_name 52.66.22.90;' \
              '' \
              '    root ${{ env.FRONTEND_DEPLOY_PATH }};' \
              '    index index.html;' \
              '' \
              '    location / {' \
              '        try_files $uri $uri/ /index.html;' \
              '    }' \
              '' \
              '    location /api/ {' \
              '        proxy_pass http://127.0.0.1:3000;' \
              '        proxy_http_version 1.1;' \
              '        proxy_set_header Upgrade $http_upgrade;' \
              '        proxy_set_header Connection '"'"'upgrade'"'"';' \
              '        proxy_set_header Host $host;' \
              '        proxy_cache_bypass $http_upgrade;' \
              '        proxy_set_header X-Real-IP $remote_addr;' \
              '        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;' \
              '    }' \
              '}' | sudo tee /etc/nginx/sites-available/github-action-test > /dev/null
            
            sudo ln -sf /etc/nginx/sites-available/github-action-test /etc/nginx/sites-enabled/
            sudo rm -f /etc/nginx/sites-enabled/default
            
            # Test Nginx config
            sudo nginx -t
            
            # Reload Nginx
            sudo systemctl reload nginx
            
          
          echo ""
          echo "=========================================="
          echo "Deployment Completed Successfully"
          echo "=========================================="
          echo ""
        ENDSSH
